[package]
name = "terminal-hub-server"
version = "0.1.0"
edition.workspace = true
description = "Browser-accessible tmux-backed terminal multiplexer with multi-user ACLs and federation"
license = "MIT OR Apache-2.0"

[lib]
path = "src/lib.rs"

[[bin]]
name = "terminal-hub"
path = "src/main.rs"

# cargo-deb metadata: build with `cargo deb -p terminal-hub-server`.
# The terminal-hub-cli binary is pulled in via merge-from = "../cli/Cargo.toml"
# — but cargo-deb doesn't support that, so we list it as an explicit asset
# from target/release/. The .deb consumer must therefore run
# `cargo build --release -p terminal-hub-cli` first (handled by dist/build-deb.sh).
[package.metadata.deb]
name = "terminal-hub"
maintainer = "terminal-hub maintainers"
copyright = "2026, terminal-hub authors"
extended-description = """\
A Rust web server that hosts long-lived terminal sessions backed by tmux and
exposes them through a browser. Supports SSH-key bootstrap + WebAuthn passkey
login, per-session ACLs for multi-user instances, and federation across
multiple instances via an ed25519 peer-key handshake."""
section = "net"
priority = "optional"
depends = "tmux (>= 3.0), $auto"
assets = [
    ["target/release/terminal-hub", "/usr/bin/", "755"],
    ["target/release/terminal-hub-cli", "/usr/bin/", "755"],
    ["static/**/*", "/usr/share/terminal-hub/static/", "644"],
    ["../../dist/deb/systemd/terminal-hub.service", "/usr/lib/systemd/user/", "644"],
    ["../../dist/deb/systemd/tmux-server.service", "/usr/lib/systemd/user/", "644"],
    ["../../dist/config.sample.toml", "/usr/share/doc/terminal-hub/", "644"],
    ["../../docs/INSTALL.md", "/usr/share/doc/terminal-hub/", "644"],
    ["../../README.md", "/usr/share/doc/terminal-hub/", "644"],
]
maintainer-scripts = "../../dist/deb/scripts"

[dependencies]
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
axum = { version = "0.7", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.5", features = ["fs", "trace"] }
tmux-client = { path = "../tmux-client" }
thiserror = { workspace = true }
uuid = { version = "1", features = ["v4", "v5", "v7", "serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
directories-next = "2"
rusqlite = { version = "0.31", features = ["bundled"] }
rcgen = "0.13"
rustls = { version = "0.23", default-features = false, features = ["ring"] }
axum-server = { version = "0.8", features = ["tls-rustls"] }
pem = "3"
sha2 = "0.10"
auth-core = { path = "../auth-core" }
argon2 = "0.5"
base64 = "0.22"
rand = "0.8"
webauthn-rs = { version = "0.5", features = ["danger-allow-state-serialisation"] }
url = "2"
cookie = "0.18"
tower-cookies = "0.10"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand_core = { version = "0.6", features = ["std"] }
toml = "0.8"
reqwest = { version = "0.12.15", default-features = false, features = ["rustls-tls", "json"] }
futures-util = "0.3"
tempfile = "3"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "test-util"] }
reqwest = { version = "0.12.15", default-features = false, features = ["rustls-tls", "json", "cookies"] }
tokio-tungstenite = "0.23"
tempfile = "3"
rand = "0.8"
ssh-key = { version = "0.6", features = ["ed25519"] }
