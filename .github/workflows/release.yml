name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl-tools (linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --workspace --release --target ${{ matrix.target }}
      - name: Stage artifact
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT="terminal-hub-${VERSION}-${{ matrix.target }}"
          mkdir -p "$ARTIFACT/bin" "$ARTIFACT/dist"
          cp target/${{ matrix.target }}/release/terminal-hub "$ARTIFACT/bin/"
          cp target/${{ matrix.target }}/release/terminal-hub-cli "$ARTIFACT/bin/"
          cp -r crates/server/static "$ARTIFACT/static"
          cp -r dist/* "$ARTIFACT/dist/"
          cp README.md "$ARTIFACT/" 2>/dev/null || true
          tar -czf "${ARTIFACT}.tar.gz" "$ARTIFACT"
          ls -l "${ARTIFACT}.tar.gz"
      - name: Build .deb (linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-deb --version '~2'
          TARGET=${{ matrix.target }} sh dist/build-deb.sh
          # Move the produced .deb to the workspace root for easy upload.
          find target -maxdepth 4 -name '*.deb' -exec cp {} . \;
          ls -l ./*.deb
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            terminal-hub-*.tar.gz
            *.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
