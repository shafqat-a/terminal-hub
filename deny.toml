# cargo-deny configuration. Install: `cargo install cargo-deny`; run: `cargo deny check`.

[graph]
all-features = false

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "warn"

[advisories]
version = 2
yanked = "warn"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
